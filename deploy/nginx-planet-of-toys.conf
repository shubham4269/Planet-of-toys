# Planet of Toys — nginx site config for a Hostinger VPS.
#
# Serves the built React client from client/dist and reverse-proxies /api to
# the Node/Express server (PM2, port 4000). Only the paid-ads funnel is
# reachable: checkout, order success, the four policy pages, and /admin.
# Every other URL returns a real HTTP 403 whose body is the SPA, so visitors
# see the branded "403 Forbidden" page.
#
# Install:
#   sudo cp deploy/nginx-planet-of-toys.conf /etc/nginx/sites-available/planet-of-toys
#   sudo ln -s /etc/nginx/sites-available/planet-of-toys /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# Replace YOURDOMAIN.com with your actual domain before installing.

server {
    listen 80;
    listen [::]:80;
    server_name YOURDOMAIN.com www.YOURDOMAIN.com;

    root /var/www/planet-of-toys/client/dist;
    index index.html;

    # ---- API → Node app (PM2) ----------------------------------------------
    location /api/ {
        proxy_pass http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 10m;   # product image uploads via /api/media
    }

    location = /health {
        proxy_pass http://127.0.0.1:4000;
    }

    # ---- Vite build assets (hashed filenames — cache aggressively) ----------
    location /assets/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location = /favicon.ico { try_files $uri =404; access_log off; }
    location = /robots.txt  { try_files $uri =404; access_log off; }

    # SPA entry point. Also used as the body of the 403 error page below, so
    # blocked URLs get a real 403 status but render the branded React page.
    location = /index.html { }

    # ---- Public homepage --------------------------------------------------
    # The domain root must be live and reachable for payment-gateway (Razorpay)
    # and ad-platform website verification, so serve the SPA (HTTP 200) at "/".
    # The React app renders a "coming soon" page here. Only the exact root is
    # opened up; every other non-funnel path still returns 403 below.
    location = / {
        try_files /index.html =404;
    }

    # ---- Allowed funnel pages (SPA routes) -----------------------------------
    # /checkout, /checkout/<product-slug>, /order/success, the four policy
    # pages, and the admin panel (which has its own login).
    location ~ ^/(checkout(/[A-Za-z0-9_-]+)?|order/success|privacy-policy|refund-policy|shipping-policy|terms-of-service|admin(/.*)?)/?$ {
        try_files /index.html =404;
    }

    # ---- Everything else: HTTP 403 Forbidden ---------------------------------
    error_page 403 /index.html;
    location / {
        return 403;
    }
}
