# Planet of Toys — nginx site config for a Hostinger VPS.
#
# Two independent single-page apps share one Node/Express backend (PM2, port
# 4000):
#   - www.planetoftoys.in     -> storefront  (apps/client/dist)
#   - admin.planetoftoys.in   -> admin panel (apps/admin/dist)
#
# The old paid-ads "403 Forbidden" lockdown has been removed: the storefront is
# now a full ecommerce site, so every SPA route is served normally.
#
# Install:
#   sudo cp deploy/nginx-planet-of-toys.conf /etc/nginx/sites-available/planet-of-toys
#   sudo ln -s /etc/nginx/sites-available/planet-of-toys /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# Build both apps before deploying:  npm run build   (builds all workspaces)

# ---- Storefront: www.planetoftoys.in -------------------------------------
server {
    listen 80;
    listen [::]:80;
    server_name planetoftoys.in www.planetoftoys.in;

    root /var/www/planet-of-toys/apps/client/dist;
    index index.html;

    # API → Node app (PM2).
    location /api/ {
        proxy_pass http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 10m;   # product image uploads via /api/media
    }

    location = /health { proxy_pass http://127.0.0.1:4000; }

    # Vite build assets (hashed filenames — cache aggressively).
    location /assets/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location = /favicon.ico { try_files $uri =404; access_log off; }
    location = /robots.txt  { try_files $uri =404; access_log off; }

    # SPA: serve index.html for any non-asset route.
    location / {
        try_files $uri /index.html;
    }
}

# ---- Admin panel: admin.planetoftoys.in ----------------------------------
server {
    listen 80;
    listen [::]:80;
    server_name admin.planetoftoys.in;

    root /var/www/planet-of-toys/apps/admin/dist;
    index index.html;

    # Admin must never be indexed.
    add_header X-Robots-Tag "noindex, nofollow" always;

    # API → same Node backend (PM2).
    location /api/ {
        proxy_pass http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 10m;   # product image uploads via /api/admin/media
    }

    location = /health { proxy_pass http://127.0.0.1:4000; }

    location /assets/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA: serve index.html for any non-asset route (admin handles /admin/*).
    location / {
        try_files $uri /index.html;
    }
}
